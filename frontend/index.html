<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=1, minimum-scale=1, maximum-scale=5" />
    <meta name="description" content="Professional car detailing VIN decoder with invoice creation and PDF export" />
    <meta name="keywords" content="VIN decoder, car detailing, invoices, NHTSA" />
    <meta name="author" content="VIN Decoder Team" />

    <!-- Apple/iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VIN Decoder" />

    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4F46E5" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />

    <title>VIN Decoder & Invoice Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            min-height: 100vh;
            color: #1E293B;
            line-height: 1.5;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body.allow-select {
            -webkit-user-select: text;
            user-select: text;
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Prevent zoom on input focus (iOS) */
        input, textarea, select {
            font-size: 16px;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Remove tap highlight */
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
